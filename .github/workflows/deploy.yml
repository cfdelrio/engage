name: Deploy to EC2

on:
  push:
    branches: [claude/event-driven-engagement-platform-Bl7PI, main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            cd /home/ec2-user/engage
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            chmod +x infra/scripts/restart-all.sh
            bash infra/scripts/restart-all.sh
